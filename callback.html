<!DOCTYPE html>
<html><head><title>TikTok Auth - WealthInMotion</title></head>
<body style="font-family:Arial;max-width:600px;margin:50px auto;text-align:center">
<h1>WealthInMotion - TikTok Auth</h1>
<div id="result"></div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
if (code) {
    document.getElementById('result').innerHTML = 
        '<h2 style="color:green">✅ Success!</h2>' +
        '<p>Copy this code and send it to Dawg in Telegram:</p>' +
        '<pre style="background:#eee;padding:20px;font-size:14px;word-break:break-all">' + code + '</pre>';
} else if (error) {
    document.getElementById('result').innerHTML = '<h2 style="color:red">❌ Error: ' + error + '</h2><p>' + (params.get('error_description')||'') + '</p>';
} else {
    document.getElementById('result').innerHTML = '<p>Waiting for redirect...</p>';
}
</script>
</body></html>
